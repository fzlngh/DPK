<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback — dfn.dev</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <style>
      :root {
        --bg: #0c0d0f;
        --surface: #141518;
        --surface2: #1c1e22;
        --border: rgba(255,255,255,0.07);
        --border-hover: rgba(255,255,255,0.14);
        --text: #e8e9eb;
        --muted: #6b7280;
        --accent: #e8d5a3;
        --accent2: #7eb8a4;
        --white: #f4f4f5;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        overflow-x: hidden;
      }

      /* Grain */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 9999;
      }

      /* Ambient blobs */
      .blob1 {
        position: fixed;
        top: -150px; right: -150px;
        width: 500px; height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(126,184,164,0.06), transparent 70%);
        pointer-events: none;
      }
      .blob2 {
        position: fixed;
        bottom: -100px; left: -100px;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(232,213,163,0.04), transparent 70%);
        pointer-events: none;
      }

      /* Card */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        animation: fadeUp 0.7s ease forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Back link */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        letter-spacing: 0.05em;
        margin-bottom: 32px;
        transition: color 0.2s;
      }
      .back-link:hover { color: var(--text); }
      .back-link::before { content: '←'; }

      /* Header */
      .header { margin-bottom: 36px; }
      .eyebrow {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--accent2);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--accent2); }

      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 36px;
        font-weight: 400;
        color: var(--white);
        line-height: 1.1;
      }
      h1 em { font-style: italic; color: var(--accent); }

      /* Form container */
      .form-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .field {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      .field:last-of-type { border-bottom: none; }

      .field label {
        display: block;
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .field input,
      .field textarea {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        color: var(--text);
        resize: none;
        line-height: 1.6;
      }
      .field input::placeholder,
      .field textarea::placeholder { color: var(--muted); }

      .field::after {
        content: '';
        position: absolute;
        bottom: 0; left: 24px; right: 24px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .field:focus-within::after { opacity: 1; }
      .field:focus-within label { color: var(--accent2); }

      /* Submit */
      .submit-wrap {
        padding: 20px 24px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .status {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--muted);
        min-height: 16px;
        transition: color 0.3s;
      }
      .status.success { color: var(--accent2); }
      .status.error { color: #f87171; }
      .status.loading { color: var(--muted); }

      .btn-submit {
        padding: 12px 28px;
        background: var(--accent);
        color: #0c0d0f;
        border: none;
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.2s;
        flex-shrink: 0;
      }
      .btn-submit:hover { opacity: 0.85; transform: translateY(-1px); }
      .btn-submit:active { transform: translateY(0); }
      .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      /* Footer */
      .footer-note {
        margin-top: 24px;
        text-align: center;
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--muted);
        opacity: 0.5;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="blob1"></div>
    <div class="blob2"></div>

    <div class="card">
      <a href="/" target="_top" class="back-link">Back to home</a>

      <div class="header">
        <div class="eyebrow">Feedback</div>
        <h1>Sampaikan<br><em>pesanmu.</em></h1>
      </div>

      <form id="feedbackForm">
        <div class="form-wrap">
          <div class="field">
            <label for="name">Nama</label>
            <input id="name" type="text" name="name" placeholder="Nama kamu" required autocomplete="off"/>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="email@contoh.com" required autocomplete="off"/>
          </div>
          <div class="field">
            <label for="message">Pesan</label>
            <textarea id="message" name="message" rows="5" placeholder="Tulis feedbackmu di sini..." required></textarea>
          </div>
        </div>

        <div class="submit-wrap">
          <span class="status" id="status"></span>
          <button type="submit" class="btn-submit" id="submitBtn">Kirim</button>
        </div>
      </form>

      <!-- Success state -->
      <div id="successBox" style="display:none;opacity:0;transition:opacity 0.5s ease;flex-direction:column;align-items:center;text-align:center;padding:48px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:20px;color:var(--accent2);">✓</div>
        <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;">Terkirim</p>
        <h2 style="font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--white);line-height:1.2;margin-bottom:12px;">Terima kasih, <em id="successName" style="font-style:italic;color:var(--accent);"></em><span style="color:var(--accent);">.</span></h2>
        <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:28px;">Masukanmu sudah kami terima dan sangat berarti.</p>
        <button onclick="location.reload()" style="padding:11px 28px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">Kirim lagi</button>
      </div>

      <p class="footer-note">© 2026 · Fazil.dev</p>
    </div>

    <script>
      (function () { emailjs.init("Fb-d0G_hUFZxRfqLb"); })();

      const form        = document.getElementById("feedbackForm");
      const formWrap    = document.querySelector(".form-wrap");
      const submitWrap  = document.querySelector(".submit-wrap");
      const status      = document.getElementById("status");
      const submitBtn   = document.getElementById("submitBtn");
      const successBox  = document.getElementById("successBox");
      const successName = document.getElementById("successName");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        status.textContent = "Mengirim...";
        status.className = "status loading";
        submitBtn.disabled = true;

        const senderName = this.querySelector('[name="name"]').value.trim();

        emailjs.sendForm("feedback-dpk089", "template_i24seja", this)
          .then(() => {
            // Reset & hide form
            form.reset();
            formWrap.style.transition = "opacity 0.35s";
            formWrap.style.opacity = "0";
            submitWrap.style.transition = "opacity 0.35s";
            submitWrap.style.opacity = "0";
            setTimeout(() => {
              formWrap.style.display = "none";
              submitWrap.style.display = "none";
              // Show success box
              successName.textContent = senderName || "kamu";
              successBox.style.display = "flex";
              requestAnimationFrame(() => { successBox.style.opacity = "1"; });
            }, 350);
          })
          .catch(() => {
            status.textContent = "✕ Gagal mengirim, coba lagi.";
            status.className = "status error";
            submitBtn.disabled = false;
          });
      });
    </script>
  </body>
</html>
